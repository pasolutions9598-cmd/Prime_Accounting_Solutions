<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Accounting Solutions - Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#f5f7fb; color: #333; }
.header { background:linear-gradient(135deg,#002d72,#009245); padding:20px; text-align:center; color:white; font-size:28px; font-weight:700; }
.container { max-width:1200px; margin:auto; padding:20px; }
.card { background:white; border-radius:15px; padding:25px; box-shadow:0 5px 15px rgba(0,0,0,.1); margin-bottom:20px; }
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
.stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-left: 5px solid #002d72; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.stat-card.views { border-left-color: #009245; }
.stat-card h3 { font-size: 14px; color: #718096; text-transform: uppercase; margin-bottom: 5px; }
.stat-card p { font-size: 28px; font-weight: 700; color: #2d3748; }
input, textarea, select { width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; font-size:15px; }
button { padding:12px 25px; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:15px; transition: 0.3s; }
.btn-primary { background:#002d72; color:white; }
.btn-primary:hover { background:#001845; }
.posts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-top:20px; }
.post-card { background:white; border-radius:12px; border:1px solid #e2e8f0; padding:20px; display:flex; flex-direction:column; justify-content:space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
.post-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
.post-card h3 { font-size:18px; color:#002d72; margin-bottom:8px; }
.post-card p { font-size:14px; color:#4a5568; line-height:1.5; margin-bottom:12px; white-space: pre-wrap; }
.badge { display:inline-block; padding:4px 10px; font-size:12px; font-weight:600; border-radius:15px; margin-right:5px; }
.badge-news { background:#e0f2fe; color:#0369a1; }
.badge-announcement { background:#fef3c7; color:#d97706; }
.badge-draft { background:#f3f4f6; color:#4b5563; }
.badge-live { background:#dcfce7; color:#15803d; }
.edit-btn { background:#ed8936; color:white; padding:6px 12px; font-size:13px; margin-right:5px; }
.delete-btn { background:#e53e3e; color:white; padding:6px 12px; font-size:13px; margin-right:5px; }
.publish-btn { background:#009245; color:white; padding:6px 12px; font-size:13px; }
.upload-status { font-size: 13px; color: #4a5568; font-style: italic; margin-top: -5px; margin-bottom: 10px; display: block; }
</style>
</head>
<body>

<div class="header">Prime Accounting Solutions - Control Panel</div>

<div class="container">
    
    <div class="analytics-grid">
        <div class="stat-card">
            <h3>Total Active Posts</h3>
            <p id="totalPosts">0</p>
        </div>
        <div class="stat-card views">
            <h3>Live Website Visitors</h3>
            <p id="totalVisitors">0</p>
        </div>
    </div>

    <div class="card">
        <h2 style="color:#002d72; margin-bottom:15px;">Create New Update / Announcement</h2>
        <form id="postForm">
            <input type="text" id="postTitle" placeholder="Enter Heading / Title" required>
            <textarea id="postContent" rows="5" placeholder="Write full details or tax updates here..." required></textarea>
            
            <label style="font-weight:600; font-size:14px; color:#4a5568;">Select Image to Upload (Optional):</label>
            <input type="file" id="postImageFile" accept="image/*">
            <span id="uploadStatus" class="upload-status"></span>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <select id="postType">
                    <option value="news">Standard Tax/Financial Update</option>
                    <option value="announcement">Important Notice / Announcement</option>
                </select>
                <select id="postCategory">
                    <option value="GST">GST Updates</option>
                    <option value="Income Tax">Income Tax</option>
                    <option value="Tally">Tally / Accounting</option>
                    <option value="General">General Business Notice</option>
                </select>
            </div>
            
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button type="button" class="btn-primary" style="background:#4a5568;" onclick="submitPost('draft')">💾 Save as Draft</button>
                <button type="button" class="btn-primary" style="background:#009245;" onclick="submitPost('published')">🚀 Publish Instantly</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h2 style="color:#002d72; margin-bottom:15px;">Manage Posted Feed Updates</h2>
        <div id="postsContainer" class="posts-grid">
            <p style="color:#718096;">Loading existing database logs...</p>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = "https://ariqthzhspzktpoylqci.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_GYSUR2xyPzrHvD0fapWjuA_6gr6_RTp"; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Function to upload file image directly to Supabase Storage
async function uploadImageFile() {
    const fileInput = document.getElementById("postImageFile");
    const uploadStatus = document.getElementById("uploadStatus");
    
    if (!fileInput.files || fileInput.files.length === 0) {
        return null; 
    }

    const file = fileInput.files[0];
    const fileExt = file.name.split('.').pop();
    const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}.${fileExt}`;
    const filePath = `${fileName}`;

    uploadStatus.innerText = "⏳ Uploading image file safely to storage...";
    uploadStatus.style.color = "#002d72";

    const { data, error } = await supabase.storage
        .from('post-images')
        .upload(filePath, file);

    if (error) {
        uploadStatus.innerText = "❌ Image upload failed: " + error.message;
        uploadStatus.style.color = "#e53e3e";
        return null;
    }

    // Generate public dynamic access link URL
    const { data: publicUrlData } = supabase.storage
        .from('post-images')
        .getPublicUrl(filePath);

    uploadStatus.innerText = "✅ Image uploaded successfully!";
    uploadStatus.style.color = "#009245";
    return publicUrlData.publicUrl;
}

window.submitPost = async function(statusText) {
    const title = document.getElementById("postTitle").value;
    const content = document.getElementById("postContent").value;
    const type = document.getElementById("postType").value;
    const category = document.getElementById("postCategory").value;

    if(!title || !content) {
        alert("Please fill out Title and Content description fields.");
        return;
    }

    // Trigger dynamic image file upload loop sequence
    const imageUrl = await uploadImageFile();

    const { error } = await supabase.from('posts').insert([{
        title, content, type, category, status: statusText, image: imageUrl
    }]);

    if(error) {
        alert("Database connection error: " + error.message);
    } else {
        alert(statusText === 'published' ? "🎉 Post has gone Live on Website!" : "💾 Post saved successfully to Drafts.");
        document.getElementById("postForm").reset();
        document.getElementById("uploadStatus").innerText = "";
        loadAnalytics(); loadPosts();
    }
}

async function loadAnalytics() {
    try {
        const { count } = await supabase.from('posts').select('*', { count: 'exact', head: true });
        document.getElementById("totalPosts").innerText = count || 0;

        const { data } = await supabase.from('site_analytics').select('visitor_count').eq('id', 'main_site').maybeSingle();
        if(data) document.getElementById("totalVisitors").innerText = data.visitor_count;
    } catch(err){}
}

async function loadPosts() {
    const container = document.getElementById("postsContainer");
    try {
        const { data: posts, error } = await supabase.from('posts').select('*').order('id', { ascending: false });
        if(error) throw error;
        
        if(!posts || posts.length === 0) {
            container.innerHTML = "<p style='color:#718096;'>No entries found in database logs yet.</p>";
            return;
        }

        container.innerHTML = "";
        posts.forEach(post => {
            const isDraft = post.status === 'draft';
            container.innerHTML += `
                <div class="post-card">
                    <div>
                        ${post.image ? `<img src="${post.image}" alt="Post image">` : ''}
                        <span class="badge ${post.type==='announcement'?'badge-announcement':'badge-news'}">${post.type.toUpperCase()}</span>
                        <span class="badge ${isDraft?'badge-draft':'badge-live'}">${post.status.toUpperCase()}</span>
                        <h3 style="margin-top:10px;">${post.title}</h3>
                        <p>${post.content}</p>
                    </div>
                    <div style="margin-top:15px;">
                        <button class="edit-btn" onclick="editPost('${post.id}', '${escape(post.title)}', '${escape(post.content)}')">✏️ Edit</button>
                        ${isDraft ? `<button class="publish-btn" onclick="publishDraft('${post.id}')">🚀 Go Live</button>` : ''}
                        <button class="delete-btn" onclick="deletePost('${post.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `;
        });
    } catch(err) {
        container.innerHTML = "Error rendering post elements.";
    }
}

window.publishDraft = async function(id) {
    await supabase.from('posts').update({ status: 'published' }).eq('id', id);
    loadPosts();
}

window.deletePost = async function(id) {
    if (!confirm("Are you sure you want to delete this post?")) return;
    await supabase.from('posts').delete().eq('id', id);
    loadAnalytics(); loadPosts();
}

window.editPost = async function(id, currentTitle, currentContent) {
    const newTitle = prompt("Update Title:", unescape(currentTitle));
    if (!newTitle) return;
    const newContent = prompt("Update Content Description:", unescape(currentContent));
    if (!newContent) return;
    await supabase.from('posts').update({ title: newTitle, content: newContent }).eq('id', id);
    loadPosts();
}

window.onload = () => {
    loadAnalytics();
    loadPosts();
};
</script>
</body>
</html>
