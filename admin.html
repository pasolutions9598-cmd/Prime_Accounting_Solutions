<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Accounting Solutions - Premium Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { 
    --primary: #002d72; 
    --secondary: #009245; 
    --dark: #0f172a; 
    --light: #f8fafc; 
    --text: #334155;
    --card-bg: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
body { background: var(--light); color: var(--text); padding-bottom: 60px; }

/* Premium Header */
.header { background: linear-gradient(135deg, #071630 0%, #1e293b 100%); padding: 25px 20px; text-align: center; color: white; font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.container { max-width: 1100px; margin: auto; padding: 40px 20px; }

/* Premium Cards */
.card { background: var(--card-bg); border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(15,23,42,0.02); border: 1px solid #e2e8f0; margin-bottom: 30px; transition: 0.3s; }
.card h2 { font-family: 'Outfit', sans-serif; color: var(--primary); font-size: 24px; margin-bottom: 25px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

/* Analytics Modern Grid */
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 30px; }
.stat-card { background: var(--card-bg); padding: 25px 30px; border-radius: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.01); border: 1px solid #e2e8f0; border-top: 5px solid var(--primary); text-align: left; position: relative; overflow: hidden; }
.stat-card.visitors { border-top-color: var(--secondary); }
.stat-title { color: #64748b; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-number { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700; margin-top: 8px; color: var(--dark); }

/* Inputs and Forms */
.row { display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
.row > div { flex: 1; min-width: 200px; }
label { font-size: 14px; font-weight: 600; color: #475569; display: block; margin-top: 15px; }
input[type="text"], input[type="email"], input[type="password"], textarea, select { width: 100%; padding: 14px; margin: 8px 0 15px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; background: #fff; color: var(--dark); transition: 0.3s; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(0,45,114,0.06); }
textarea { min-height: 150px; resize: vertical; }

/* Premium Buttons */
button { padding: 14px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
button:hover { transform: translateY(-1px); }
.login-btn { background: var(--primary); color: white; width: 100%; margin-top: 15px; padding: 16px; box-shadow: 0 4px 12px rgba(0,45,114,0.15); }
.publish-btn { background: var(--secondary); color: white; box-shadow: 0 4px 12px rgba(0,146,69,0.15); }
.draft-btn { background: #64748b; color: white; }
.logout-btn { background: #ef4444; color: white; float: right; padding: 10px 20px; font-size: 14px; box-shadow: 0 4px 12px rgba(239,68,68,0.15); }

/* Custom File Upload Button */
.custom-file-btn { display: block; background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; color: #475569; font-weight: 500; margin: 8px 0 15px; transition: 0.3s; }
.custom-file-btn:hover { background: #f1f5f9; border-color: var(--primary); }
input[type="file"] { display: none; }

#adminPanel { display: none; }
#loginBox { display: block; }

/* Modern Post Manager Cards */
.post-card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; border: 1px solid #e2e8f0; }
.post-card h3 { font-family: 'Outfit', sans-serif; font-size: 20px; color: var(--dark); margin: 10px 0; }
.post-card img { width: 100%; border-radius: 12px; margin: 15px 0; max-height: 250px; object-fit: contain; background: #f8fafc; border: 1px solid #f1f5f9; }
.post-meta-info { font-size: 13px; color: #64748b; margin-top: 15px; background: #f8fafc; padding: 10px 15px; border-radius: 8px; display: inline-block; }
.badge { display: inline-block; padding: 4px 12px; font-size: 11px; font-weight: 700; border-radius: 30px; text-transform: uppercase; margin-right: 5px; }
.badge-news { background: #e0f2fe; color: #0369a1; }
.badge-announcement { background: #fef3c7; color: #d97706; }
.badge-draft { background: #f1f5f9; color: #475569; }

.edit-btn { background: #facc15; color: #0f172a; padding: 8px 16px; font-size: 13px; }
.delete-btn { background: #fee2e2; color: #ef4444; padding: 8px 16px; font-size: 13px; }
.delete-btn:hover { background: #ef4444; color: white; }
</style>
</head>
<body>

<div class="header">Prime Accounting Solutions — Dashboard</div>

<div class="container">
    <div class="card" id="loginBox" style="max-width: 420px; margin: 60px auto; padding: 40px 35px;">
        <h2 style="font-size: 26px; justify-content: center; margin-bottom: 10px;">Admin Access</h2>
        <p style="text-align: center; color: #64748b; font-size: 14px; margin-bottom: 30px;">Secure Management Terminal</p>
        <form id="loginForm" onsubmit="event.preventDefault(); window.loginAdmin();">
            <input type="email" id="email" placeholder="Corporate Email Address" required>
            <input type="password" id="password" placeholder="Secure Password" required>
            <button type="submit" class="login-btn">Sign In To Dashboard</button>
        </form>
    </div>

    <div id="adminPanel">
        <div class="card" style="padding: 20px 30px; overflow: hidden; margin-bottom: 30px; border-left: 5px solid var(--primary);">
            <button class="logout-btn" onclick="window.logoutAdmin()">Exit Session</button>
            <span style="font-weight: 600; color: var(--dark); line-height: 45px; font-family: 'Outfit'; font-size: 18px;">👤 Terminal Secure: Administrator</span>
        </div>

        <div class="analytics-grid">
            <div class="stat-card visitors">
                <div class="stat-title">📊 Live Site Visitors</div>
                <div class="stat-number" id="totalVisitors">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">📝 Total Feed Analytics</div>
                <div class="stat-number" id="totalPostsCount">0</div>
            </div>
        </div>

        <div class="card">
            <h2>✍️ Compose Executive Broadcast</h2>
            <div class="row">
                <div>
                    <label>Distribution Type</label>
                    <select id="postType">
                        <option value="news">Regular Tax Update</option>
                        <option value="announcement">🚨 Critical Announcement</option>
                    </select>
                </div>
                <div>
                    <label>Stream Category</label>
                    <select id="postCategory">
                        <option value="General">General</option>
                        <option value="GST">GST Updates</option>
                        <option value="Income Tax">Income Tax</option>
                        <option value="Audit">Audit & Assurance</option>
                        <option value="Accounting">Accounting Solutions</option>
                    </select>
                </div>
            </div>

            <label>Broadcast Title</label>
            <input type="text" id="postTitle" placeholder="Enter headline statement...">
            
            <label>Featured Infographic Media (Optional)</label>
            <label for="imageFile" class="custom-file-btn" id="uploadBtnLabel">📁 Click to Upload Graphic Attachment</label>
            <input type="file" id="imageFile" accept="image/*">
            <img id="previewImage" style="display:none; width:100%; max-height:250px; object-fit:contain; border-radius:12px; margin-bottom:20px; background:#f8fafc; border:1px solid #e2e8f0;">
            
            <label>Content Description / Brief</label>
            <textarea id="postContent" placeholder="Write comprehensive update specifications here..."></textarea>

            <button class="publish-btn" onclick="window.saveContent('published')" id="submitBtn">Deploy Live Broadcast</button>
            <button class="draft-btn" onclick="window.saveContent('draft')">Store to Drafts</button>
        </div>

        <div class="card">
            <h2>🗄️ Stream Management Registry</h2>
            <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <label style="margin-top:0; color:#64748b;">Filter Stream Logs:</label>
                <select id="filterCategory" onchange="window.loadPosts()" style="width:auto; margin:0; padding:10px 20px; border-radius:10px;">
                    <option value="All">All Categories</option>
                    <option value="General">General</option>
                    <option value="GST">GST Updates</option>
                    <option value="Income Tax">Income Tax</option>
                    <option value="Audit">Audit & Assurance</option>
                    <option value="Accounting">Accounting Solutions</option>
                </select>
            </div>
            <div id="postsContainer"></div>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = "https://ariqthzhspzktpoylqci.supabase.co";
const SUPABASE_KEY = "sb_publishable_GYSUR2xyPzrHvD0fapWjuA_6gr6_RTp";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAIL = "p.a.solutions9598@gmail.com";
const ADMIN_PASSWORD = "aqibsolutions@9598";

document.getElementById("imageFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById("uploadBtnLabel").innerText = "✅ Attached: " + file.name;
    const reader = new FileReader();
    reader.onload = function(ev){
        const img = document.getElementById("previewImage");
        img.src = ev.target.result;
        img.style.display = "block";
    };
    reader.readAsDataURL(file);
});

window.loginAdmin = function() {
    const emailInput = document.getElementById("email").value.trim();
    const passwordInput = document.getElementById("password").value.trim();
    
    if(emailInput === ADMIN_EMAIL && passwordInput === ADMIN_PASSWORD) {
        localStorage.setItem("prime_admin_logged", "yes");
        checkAuth();
    } else {
        alert("Security Override: Invalid Credentials.");
    }
}

window.logoutAdmin = function() {
    localStorage.removeItem("prime_admin_logged");
    checkAuth();
}

function checkAuth() {
    const status = localStorage.getItem("prime_admin_logged");
    if(status === "yes") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadAnalytics();
        window.loadPosts();
    } else {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
    }
}

async function loadAnalytics() {
    try {
        const { data: analytics } = await supabase.from('site_analytics').select('visitor_count').eq('id', 'main_site').maybeSingle();
        if(analytics) document.getElementById("totalVisitors").innerText = analytics.visitor_count;
        const { count } = await supabase.from('posts').select('*', { count: 'exact', head: true });
        document.getElementById("totalPostsCount").innerText = count || 0;
    } catch (e) { console.error(e); }
}

window.saveContent = async function(status) {
    const title = document.getElementById("postTitle").value;
    const content = document.getElementById("postContent").value;
    const type = document.getElementById("postType").value;
    const category = document.getElementById("postCategory").value;
    const file = document.getElementById("imageFile").files[0];
    const submitBtn = document.getElementById("submitBtn");

    if(!title || !content) {
        alert("Error: Core parameters missing.");
        return;
    }

    submitBtn.innerText = "⏳ Synchronizing Server...";
    submitBtn.disabled = true;
    let imageUrl = "";

    try {
        if(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}.${fileExt}`;
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('post-images')
                .upload(fileName, file);
                
            if (uploadError) throw uploadError;

            const { data: urlData } = supabase.storage.from('post-images').getPublicUrl(fileName);
            imageUrl = urlData.publicUrl;
        }

        const { error: dbError } = await supabase.from('posts').insert([{ title, content, type, category, status, image: imageUrl }]);
        if (dbError) throw dbError;

        alert(status === 'published' ? "Broadcast Synchronized Live! 🚀" : "Saved to Repository Drafts! 📁");
        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        document.getElementById("imageFile").value = "";
        document.getElementById("previewImage").style.display = "none";
        document.getElementById("uploadBtnLabel").innerText = "📁 Click to Upload Graphic Attachment";
        loadAnalytics();
        window.loadPosts();
    } catch (error) {
        alert("Transmission Exception: " + error.message);
    } finally {
        submitBtn.innerText = "Deploy Live Broadcast";
        submitBtn.disabled = false;
    }
}

window.loadPosts = async function() {
    const container = document.getElementById("postsContainer");
    const filterCat = document.getElementById("filterCategory").value;
    container.innerHTML = "Querying Database Registry...";

    try {
        let query = supabase.from('posts').select('id, title, content, type, category, status, image, created_at');

        if(filterCat !== "All") { query = query.eq('category', filterCat); }
        
        // FIX: ordered by 'created_at' instead of 'id' to prevent uuid data parsing crash
        const { data: posts, error } = await query.order('created_at', { ascending: false });
        if (error) throw error;

        container.innerHTML = "";
        if(!posts || posts.length === 0) { container.innerHTML = "<p style='color:#94a3b8; padding:15px;'>Registry clear. No matching data blocks.</p>"; return; }

        posts.forEach((post) => {
            const dateFormatted = post.created_at ? new Date(post.created_at).toLocaleString() : "Recently";
            const isAnnounce = post.type === 'announcement';
            const isDraft = post.status === 'draft';
            container.innerHTML += `
                <div class="post-card" style="${isAnnounce ? 'border-left: 5px solid #d97706;' : ''} ${isDraft ? 'opacity:0.8; border-left:5px solid #64748b;' : ''}">
                    <div>
                        ${isDraft ? '<span class="badge badge-draft">📁 DRAFT</span>' : ''}
                        <span class="badge ${isAnnounce ? 'badge-announcement' : 'badge-news'}">${isAnnounce ? '🚨 ANNOUNCEMENT' : '📝 LOGGED BLOCK'}</span>
                        <span class="badge" style="background:#e2f0d9; color:#385723;">🏷️ ${post.category}</span>
                    </div>
                    <h3>${post.title || ""}</h3>
                    ${post.image ? `<img src="${post.image}">` : ""}
                    <p style="margin-top:10px; color:#475569; font-size:14px; line-height:1.6; white-space: pre-wrap;">${post.content || ""}</p>
                    <div><div class="post-meta-info">📅 Log Time: ${dateFormatted}</div></div>
                    <div style="margin-top:20px;">
                        <button class="edit-btn" onclick="window.editPost('${post.id}', '${escape(post.title)}', '${escape(post.content)}')">✏️ Modify</button>
                        ${isDraft ? `<button class="publish-btn" style="padding:8px 16px; font-size:13px;" onclick="window.publishDraft('${post.id}')">🚀 Force Live</button>` : ''}
                        <button class="delete-btn" onclick="window.deletePost('${post.id}')">🗑️ Purge</button>
                    </div>
                </div>
            `;
        });
    } catch(err) {
        console.error("Supabase Error Logs: ", err);
        container.innerHTML = "Registry Error. Please verify Table structure or RLS configuration.";
    }
}

window.publishDraft = async function(id) {
    await supabase.from('posts').update({ status: 'published' }).eq('id', id);
    window.loadPosts();
}
window.deletePost = async function(id) {
    if (!confirm("Confirm hard purge of this data block?")) return;
    await supabase.from('posts').delete().eq('id', id);
    loadAnalytics(); window.loadPosts();
}
window.editPost = async function(id, currentTitle, currentContent) {
    const newTitle = prompt("Modify Specification Headline:", unescape(currentTitle));
    if (!newTitle) return;
    const newContent = prompt("Modify Brief Data Description:", unescape(currentContent));
    if (!newContent) return;
    await supabase.from('posts').update({ title: newTitle, content: newContent }).eq('id', id);
    window.loadPosts();
}

checkAuth();
</script>
</body>
</html>
