        /* =====================================================
           BIG 4 INSPIRED LUXURY THEME ARCHITECTURE (UPDATED)
        ===================================================== */
        :root {
            --bg-primary: #040712;
            --bg-secondary: #080d22;
            --bg-surface: rgba(11, 19, 43, 0.7);
            --gold-light: #fff2b0;
            --gold-primary: #dfb74c;
            --gold-dark: #9e751d;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-glow: rgba(223, 183, 76, 0.2);
            --border-hover: rgba(223, 183, 76, 0.45);
            --shadow-corporate: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-gold: 0 15px 35px rgba(223, 183, 76, 0.15);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

        /* Reset & Base Formatting */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            overflow-x: hidden;
            letter-spacing: -0.2px;
        }

        /* Global Typography Overrides */
        p {
            color: var(--text-secondary);
            font-size: 15.5px;
            line-height: 1.8;
        }

        strong {
            color: var(--gold-primary);
            font-weight: 600;
        }

        /* Selection & Scrollbar Styling */
        ::selection {
            background: var(--gold-primary);
            color: var(--bg-primary);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 20px;
        }

        /* Background Gradient Alternation Mapping */

        #pricing-fluid { background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); }
        #founder-fluid { background: radial-gradient(circle at 80% 20%, #0b1635 0%, var(--bg-primary) 70%); }
        #appointment-fluid { background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%); }
