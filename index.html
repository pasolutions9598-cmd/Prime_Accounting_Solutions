<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Accounting Solutions V4</title>
<style>
body{font-family:Arial;margin:0;background:#f5f7fb}
header{background:#002d72;color:#fff;padding:15px;text-align:center}
.banner{background:#ffeb3b;padding:10px;text-align:center;font-weight:bold}
.menu{background:#001845;padding:10px;text-align:center}
.menu a{color:#fff;margin:10px;text-decoration:none}
.card{background:#fff;margin:15px;padding:15px;border-radius:10px;box-shadow:0 2px 8px #ccc}
.admin-panel{display:none}
input,textarea{width:100%;padding:10px;margin:5px 0}
button{padding:10px 15px}
.postimg{max-width:100%}
</style>
</head>
<body>
<div class="banner">📢 Welcome to Prime Accounting Solutions</div>
<header><h1>Prime Accounting Solutions V4</h1></header>
<div class="menu">
<a href="#updates">Updates</a>
<a href="#" onclick="adminLogin()">Admin</a>
</div>

<section id="updates" class="card">
<h2>Latest Updates</h2>
<div id="posts"></div>
</section>

<section id="admin" class="card admin-panel">
<h2>Publish Post</h2>
<input id="title" placeholder="Title">
<input id="image" placeholder="Image URL">
<textarea id="content" placeholder="Content"></textarea>
<button onclick="publishPost()">Publish</button>
</section>

<script>
function adminLogin(){
let e=prompt("Email");
let p=prompt("Password");
if(e==="p.a.solutions9598@gmail.com" && p==="aqibsolutions@9598"){
document.querySelector(".admin-panel").style.display="block";
alert("Login Success");
}else{alert("Invalid Login");}
}

function publishPost(){
let t=document.getElementById('title').value;
let i=document.getElementById('image').value;
let c=document.getElementById('content').value;
let d=new Date().toLocaleString();
document.getElementById('posts').innerHTML=
'<div class="card"><h3>'+t+'</h3><img class="postimg" src="'+i+'"><p>'+c+
'</p><small>'+d+'</small><br>❤️ 0 Likes | 👁️ 0 Views</div>'
+ document.getElementById('posts').innerHTML;
}
</script>
</body>
</html>
