<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Accounting Solutions - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#f5f7fb; color: #333; }
.header { background:linear-gradient(135deg,#002d72,#009245); padding:20px; text-align:center; color:white; font-size:28px; font-weight:700; }
.container { max-width:1200px; margin:auto; padding:20px; }
.card { background:white; border-radius:15px; padding:25px; box-shadow:0 5px 15px rgba(0,0,0,.1); margin-bottom:20px; }
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
.stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-left: 5px solid #002d72; }
input, textarea, select { width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; }
button { padding:12px 25px; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
.btn-primary { background:#002d72; color:white; }
.posts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-top:20px; }
.post-card { background:white; border-radius:12px; border:1px solid #e2e8f0; padding:20px; }
.post-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }
.badge { display:inline-block; padding:4px 10px; font-size:12px; font-weight:600; border-radius:15px; }
.badge-news { background:#e0f2fe; color:#0369a1; }
.badge-announcement { background:#fef3c7; color:#d97706; }
.edit-btn { background:#ed8936; color:white; padding:6px 12px; font-size:13px; }
.delete-btn { background:#e53e3e; color:white; padding:6px 12px; font-size:13px; }
.upload-status { font-size: 13px; color: #4a5568; display: block; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="header">Prime Accounting Solutions - Control Panel</div>
<div class="container">
    <div class="card">
        <h2>Create New Update / Announcement</h2>
        <form id="postForm">
            <input type="text" id="postTitle" placeholder="Enter Heading / Title" required>
            <textarea id="postContent" rows="5" placeholder="Write full details..." required></textarea>
            <label>Select Image to Upload (Optional):</label>
            <input type="file" id="postImageFile" accept="image/*">
            <span id="uploadStatus" class="upload-status"></span>
            <select id="postType">
                <option value="news">Standard Tax/Financial Update</option>
                <option value="announcement">Important Notice / Announcement</option>
            </select>
            <select id="postCategory">
                <option value="GST">GST Updates</option>
                <option value="Income Tax">Income Tax</option>
                <option value="Tally">Tally / Accounting</option>
                <option value="General">General Business Notice</option>
            </select>
            <button type="button" class="btn-primary" style="background:#009245;" onclick="submitPost('published')">🚀 Publish Instantly</button>
        </form>
    </div>
    <div class="card">
        <h2>Manage Posted Feed Updates</h2>
        <div id="postsContainer" class="posts-grid"><p>Loading entries...</p></div>
    </div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const SUPABASE_URL = "https://ariqthzhspzktpoylqci.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_GYSUR2xyPzrHvD0fapWjuA_6gr6_RTp"; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

async function uploadImageFile() {
    const fileInput = document.getElementById("postImageFile");
    const uploadStatus = document.getElementById("uploadStatus");
    if (!fileInput.files || fileInput.files.length === 0) return null;
    const file = fileInput.files[0];
    const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}`;
    uploadStatus.innerText = "⏳ Uploading image file...";
    const { data, error } = await supabase.storage.from('post-images').upload(fileName, file);
    if (error) { uploadStatus.innerText = "❌ Upload failed"; return null; }
    const { data: publicUrlData } = supabase.storage.from('post-images').getPublicUrl(fileName);
    return publicUrlData.publicUrl;
}

window.submitPost = async function(statusText) {
    const title = document.getElementById("postTitle").value;
    const content = document.getElementById("postContent").value;
    const type = document.getElementById("postType").value;
    const category = document.getElementById("postCategory").value;
    if(!title || !content) return;
    const imageUrl = await uploadImageFile();
    await supabase.from('posts').insert([{ title, content, type, category, status: statusText, image: imageUrl }]);
    alert("🎉 Post has gone Live!");
    location.reload();
}

async function loadPosts() {
    const container = document.getElementById("postsContainer");
    const { data: posts } = await supabase.from('posts').select('*').order('id', { ascending: false });
    if(!posts || posts.length === 0) { container.innerHTML = "<p>No posts found.</p>"; return; }
    container.innerHTML = "";
    posts.forEach(post => {
        container.innerHTML += `
            <div class="post-card">
                ${post.image ? `<img src="${post.image}">` : ''}
                <h3>${post.title}</h3>
                <p>${post.content}</p>
                <button class="delete-btn" onclick="deletePost('${post.id}')">🗑️ Delete</button>
            </div>`;
    });
}
window.deletePost = async function(id) {
    if (!confirm("Delete this post?")) return;
    await supabase.from('posts').delete().eq('id', id);
    loadPosts();
}
window.onload = () => { loadPosts(); };
</script>
</body>
</html>
