<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Accounting Solutions - Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#f5f7fb; color: #333; }
.header { background:linear-gradient(135deg,#002d72,#009245); padding:20px; text-align:center; color:white; font-size:28px; font-weight:700; }
.container { max-width:1200px; margin:auto; padding:20px; }
.card { background:white; border-radius:15px; padding:25px; box-shadow:0 5px 15px rgba(0,0,0,.1); margin-bottom:20px; }
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
.stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border-top: 4px solid #002d72; text-align: center; }
.stat-card.visitors { border-top-color: #009245; }
.stat-number { font-size: 26px; font-weight: 700; margin-top: 5px; color: #1e293b; }
.row { display: flex; gap: 15px; margin-bottom: 10px; }
.row > div { flex: 1; }
label { font-size: 14px; font-weight: 500; color: #555; display: block; margin-top: 10px; }
input[type="text"], input[type="email"], input[type="password"], textarea, select { width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px; font-size:15px; background: #f9fbfd; }
textarea { min-height:140px; resize:vertical; }
.custom-file-btn { display: block; background: #f0f4f8; border: 2px dashed #cbd5e1; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; color: #475569; font-weight: 500; margin: 8px 0; }
input[type="file"] { display: none; }
button { padding:12px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size: 15px; margin-right: 5px; }
.login-btn { background:#002d72; color:white; width:100%; margin-top: 10px; }
.publish-btn { background:#009245; color:white; }
.draft-btn { background:#64748b; color:white; }
.logout-btn { background:#d62828; color:white; float:right; padding: 8px 16px; font-size: 13px; }
.edit-btn { background:#ffb703; color:black; }
.delete-btn { background:#d62828; color:white; }
#adminPanel { display:none; }
.post-card { background:#fff; padding:20px; border-radius:12px; box-shadow:0 3px 10px rgba(0,0,0,.08); margin-bottom:15px; border: 1px solid #edf2f7; }
.post-card img { width:100%; border-radius:10px; margin:15px 0; max-height:300px; object-fit:cover; }
.post-meta-info { font-size:12px; color:#666; margin-top:10px; display: flex; gap: 20px; background: #f8fafc; padding: 8px; border-radius: 6px; }
.badge { display: inline-block; padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 20px; margin-bottom: 10px; margin-right: 5px; }
.badge-news { background: #e0f2fe; color: #0369a1; }
.badge-announcement { background: #fef3c7; color: #d97706; }
.badge-draft { background: #f1f5f9; color: #475569; }
</style>
</head>
<body>

<div class="header">Prime Accounting Solutions - Admin Panel</div>

<div class="container">
    <div class="card" id="loginBox" style="max-width: 450px; margin: 50px auto;">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="login-btn" onclick="loginAdmin()">Login</button>
    </div>

    <div id="adminPanel">
        <div class="analytics-grid">
            <div class="stat-card visitors">
                <div style="color: #009245; font-weight: 600;">📊 Total Website Visitors</div>
                <div class="stat-number" id="totalVisitors">0</div>
            </div>
            <div class="stat-card">
                <div style="color: #002d72; font-weight: 600;">📝 Total Posts Created</div>
                <div class="stat-number" id="totalPostsCount">0</div>
            </div>
        </div>

        <div class="card">
            <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
            <h2>Publish New Post</h2>
            <div class="row">
                <div>
                    <label>Post Type</label>
                    <select id="postType">
                        <option value="news">Regular Blog Post</option>
                        <option value="announcement">🚨 Important Announcement</option>
                    </select>
                </div>
                <div>
                    <label>Category</label>
                    <select id="postCategory">
                        <option value="General">General</option>
                        <option value="GST">GST Updates</option>
                        <option value="Income Tax">Income Tax</option>
                        <option value="Audit">Audit & Assurance</option>
                        <option value="Accounting">Accounting Solutions</option>
                    </select>
                </div>
            </div>

            <label>Post Title</label>
            <input type="text" id="postTitle" placeholder="Post Title">
            
            <label>Featured Image (Select from Gallery)</label>
            <label for="imageFile" class="custom-file-btn" id="uploadBtnLabel">📁 Click to Choose Image</label>
            <input type="file" id="imageFile" accept="image/*">
            <img id="previewImage" style="display:none; width:100%; max-height:250px; object-fit:cover; border-radius:10px; margin-bottom:15px;">
            
            <label>Post Content</label>
            <textarea id="postContent" placeholder="Write Post Content"></textarea>

            <button class="publish-btn" onclick="saveContent('published')" id="submitBtn">Publish Post</button>
            <button class="draft-btn" onclick="saveContent('draft')">Save as Draft</button>
        </div>

        <div class="card">
            <h2>Manage Posts</h2>
            <div style="margin-bottom: 15px;">
                <label style="display:inline; margin-right:10px;">Filter list by category:</label>
                <select id="filterCategory" onchange="loadPosts()" style="width:auto; padding:6px; margin:0;">
                    <option value="All">All Categories</option>
                    <option value="General">General</option>
                    <option value="GST">GST Updates</option>
                    <option value="Income Tax">Income Tax</option>
                    <option value="Audit">Audit & Assurance</option>
                    <option value="Accounting">Accounting Solutions</option>
                </select>
            </div>
            <div id="postsContainer"></div>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = "https://bxbrejqwkofkptqmwqg.supabase.co"; 
const SUPABASE_KEY = "Sb_publishable_S9E61UZanfJ859eK6PoU4A_5fS92g7Q"; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAIL = "p.a.solutions9598@gmail.com";
const ADMIN_PASSWORD = "aqibsolutions@9598";

document.getElementById("imageFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById("uploadBtnLabel").innerText = "✅ Selected: " + file.name;
    const reader = new FileReader();
    reader.onload = function(ev){
        const img = document.getElementById("previewImage");
        img.src = ev.target.result;
        img.style.display = "block";
    };
    reader.readAsDataURL(file);
});

window.loginAdmin = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
        sessionStorage.setItem("isAdminIn", "true");
        checkAuth();
    } else {
        alert("Wrong email or password!");
    }
}

window.logoutAdmin = function() {
    sessionStorage.removeItem("isAdminIn");
    checkAuth();
}

function checkAuth() {
    const isLoggedIn = sessionStorage.getItem("isAdminIn");
    if(isLoggedIn === "true") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadAnalytics();
        loadPosts();
    } else {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
    }
}
window.onload = checkAuth;

async function loadAnalytics() {
    try {
        const { data: analytics } = await supabase.from('site_analytics').select('visitor_count').eq('id', 'main_site').maybeSingle();
        if(analytics) document.getElementById("totalVisitors").innerText = analytics.visitor_count;
        
        const { count } = await supabase.from('posts').select('*', { count: 'exact', head: true });
        document.getElementById("totalPostsCount").innerText = count || 0;
    } catch (e) { console.error("Analytics failed", e); }
}

window.saveContent = async function(status) {
    const title = document.getElementById("postTitle").value;
    const content = document.getElementById("postContent").value;
    const type = document.getElementById("postType").value;
    const category = document.getElementById("postCategory").value;
    const file = document.getElementById("imageFile").files[0];
    const submitBtn = document.getElementById("submitBtn");

    if(!title || !content) {
        alert("Title and Content are required!");
        return;
    }

    submitBtn.innerText = "⏳ Saving...";
    submitBtn.disabled = true;
    let imageUrl = "";

    try {
        if(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `uploads/${fileName}`;

            const { error: uploadError } = await supabase.storage.from('post-images').upload(filePath, file);
            if(uploadError) throw uploadError;

            const { data: urlData } = supabase.storage.from('post-images').getPublicUrl(filePath);
            imageUrl = urlData.publicUrl;
        }

        const { error: dbError } = await supabase
            .from('posts')
            .insert([{ title, content, type, category, status, image: imageUrl }]);

        if (dbError) throw dbError;

        alert(status === 'published' ? "Post Published Live! 🚀" : "Saved as Draft! 📁");
        
        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        document.getElementById("imageFile").value = "";
        document.getElementById("previewImage").style.display = "none";
        document.getElementById("uploadBtnLabel").innerText = "📁 Click to Choose Image";
        
        loadAnalytics();
        loadPosts();
    } catch (error) {
        alert("Error: " + error.message);
    } finally {
        submitBtn.innerText = "Publish Post";
        submitBtn.disabled = false;
    }
}

window.loadPosts = async function() {
    const container = document.getElementById("postsContainer");
    const filterCat = document.getElementById("filterCategory").value;
    container.innerHTML = "Loading posts...";

    try {
        let query = supabase.from('posts').select('*');
        if(filterCat !== "All") {
            query = query.eq('category', filterCat);
        }
        
        const { data: posts, error } = await query.order('id', { ascending: false });

        if (error) throw error;

        container.innerHTML = "";
        if(!posts || posts.length === 0) { container.innerHTML = "<p style='color:#999;'>No content found.</p>"; return; }

        posts.forEach((post) => {
            const dateFormatted = post.created_at ? new Date(post.created_at).toLocaleString() : "Recently";
            const isAnnounce = post.type === 'announcement';
            const isDraft = post.status === 'draft';
            
            container.innerHTML += `
                <div class="post-card" style="${isAnnounce ? 'border-left: 5px solid #d97706;' : ''} ${isDraft ? 'opacity:0.8; border-left:5px solid #64748b;' : ''}">
                    <div>
                        ${isDraft ? '<span class="badge badge-draft">📁 DRAFT</span>' : ''}
                        <span class="badge ${isAnnounce ? 'badge-announcement' : 'badge-news'}">
                            ${isAnnounce ? '🚨 ANNOUNCEMENT' : '📝 BLOG POST'}
                        </span>
                        <span class="badge" style="background:#dcfce7; color:#15803d;">🏷️ ${post.category}</span>
                    </div>
                    <h3>${post.title || ""}</h3>
                    ${post.image ? `<img src="${post.image}">` : ""}
                    <p style="margin-top:10px; color:#4a5568; line-height:1.6;">${post.content || ""}</p>
                    <div class="post-meta-info">
                        <div>📅 Created: ${dateFormatted}</div>
                        <div style="color: #009245; font-weight:600;">👁️ Views: ${post.views || 0}</div>
                    </div>
                    <div style="margin-top:15px;">
                        <button class="edit-btn" onclick="editPost('${post.id}', '${escape(post.title)}', '${escape(post.content)}')">✏️ Edit</button>
                        ${isDraft ? `<button class="publish-btn" style="padding:6px 12px; font-size:13px;" onclick="publishDraft('${post.id}')">🚀 Go Live</button>` : ''}
                        <button class="delete-btn" onclick="deletePost('${post.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `;
        });
    } catch(err) {
        container.innerHTML = "Error loading posts. Please check database tables.";
        console.error(err);
    }
}

window.publishDraft = async function(id) {
    const { error } = await supabase.from('posts').update({ status: 'published' }).eq('id', id);
    if (error) alert(error.message);
    else loadPosts();
}

window.deletePost = async function(id) {
    if (!confirm("Are you sure?")) return;
    const { error } = await supabase.from('posts').delete().eq('id', id);
    if (error) alert(error.message);
    else { loadAnalytics(); loadPosts(); }
}

window.editPost = async function(id, currentTitle, currentContent) {
    const newTitle = prompt("Update Title:", unescape(currentTitle));
    if (newTitle === null) return;
    const newContent = prompt("Update Content Description:", unescape(currentContent));
    if (newContent === null) return;

    const { error } = await supabase.from('posts').update({ title: newTitle, content: newContent }).eq('id', id);
    if (error) alert(error.message);
    else loadPosts();
}
</script>
</body>
</html>
