<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Accounting Solutions - Premium Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { 
    --primary-color: #0b132b;    
    --secondary-color: #1c2541;  
    --gold-color: #e5c158;       
    --gold-dark: #d4af37;        
    --text-dark: #1c2541;        
    --text-light: #f8fafc;       
    --bg-light: #f8fafc;         
    --card-bg: #ffffff;          
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', 'Inter', sans-serif; }
body { background: var(--bg-light); color: var(--text-dark); padding-bottom: 60px; }

.header { 
    background-color: var(--primary-color); 
    padding: 25px 20px; 
    text-align: center; 
    color: var(--gold-color); 
    font-size: 28px; 
    font-weight: 700; 
    letter-spacing: 0.5px; 
    box-shadow: 0 4px 25px rgba(0,0,0,0.25); 
    border-bottom: 3px solid var(--gold-dark);
}
.container { max-width: 1100px; margin: auto; padding: 40px 20px; }

.card { 
    background: var(--card-bg); 
    border-radius: 12px; 
    padding: 35px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
    border: 1px solid #e2e8f0; 
    border-top: 4px solid var(--gold-dark); 
    margin-bottom: 30px; 
    transition: var(--transition); 
}
.card h2 { color: var(--gold-dark); font-size: 24px; margin-bottom: 25px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

.analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 30px; }
.stat-card { background: var(--card-bg); padding: 25px 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.01); border: 1px solid #e2e8f0; border-top: 5px solid var(--gold-dark); text-align: left; position: relative; overflow: hidden; }
.stat-card.visitors { border-top-color: var(--primary-color); }
.stat-title { color: var(--text-dark); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-number { font-size: 36px; font-weight: 700; margin-top: 8px; color: var(--gold-dark); }

.row { display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
.row > div { flex: 1; min-width: 200px; }
label { font-size: 14px; font-weight: 600; color: var(--text-dark); display: block; margin-top: 15px; }
input[type="text"], input[type="email"], input[type="password"], textarea, select { width: 100%; padding: 14px; margin: 8px 0 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; background: #fff; color: var(--text-dark); transition: var(--transition); }
input:focus, textarea:focus, select:focus { border-color: var(--gold-dark); outline: none; box-shadow: 0 0 0 4px rgba(229, 193, 88, 0.2); }
textarea { min-height: 150px; resize: vertical; }

button { padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
button:hover { transform: translateY(-2px); }
.login-btn { background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); color: var(--gold-color); width: 100%; margin-top: 15px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.login-btn:hover { color: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.publish-btn { background: linear-gradient(90deg, var(--gold-dark), var(--gold-color)); color: var(--primary-color); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2); }
.publish-btn:hover { box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); }
.draft-btn { background: var(--secondary-color); color: white; }
.logout-btn { background: #ef4444; color: white; float: right; padding: 10px 20px; font-size: 14px; box-shadow: 0 4px 12px rgba(239,68,68,0.15); border-radius: 30px; }

.custom-file-btn { display: block; background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; color: var(--text-dark); font-weight: 500; margin: 8px 0 15px; transition: var(--transition); }
.custom-file-btn:hover { background: #f1f5f9; border-color: var(--gold-dark); }
input[type="file"] { display: none; }

#adminPanel { display: none; }
#loginBox { display: block; }

.post-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; border: 1px solid #e2e8f0; border-left: 4px solid var(--primary-color); }
.post-card h3 { font-size: 20px; color: var(--gold-dark); margin: 10px 0; }
.post-card img { width: 100%; border-radius: 8px; margin: 15px 0; max-height: 250px; object-fit: contain; background: #f8fafc; border: 1px solid #f1f5f9; }
.post-meta-info { font-size: 13px; color: var(--text-dark); margin-top: 15px; background: #f8fafc; padding: 10px 15px; border-radius: 8px; display: inline-block; font-weight: 500; }
.badge { display: inline-block; padding: 4px 12px; font-size: 11px; font-weight: 700; border-radius: 30px; text-transform: uppercase; margin-right: 5px; }
.badge-news { background: #e0f2fe; color: #0369a1; }
.badge-announcement { background: #fee2e2; color: #b91c1c; }
.badge-draft { background: #f1f5f9; color: #475569; }

.edit-btn { background: #facc15; color: #0f172a; padding: 8px 16px; font-size: 13px; }
.delete-btn { background: #fee2e2; color: #ef4444; padding: 8px 16px; font-size: 13px; }
.delete-btn:hover { background: #ef4444; color: white; }
</style>
</head>
<body>

<div class="header">Prime Accounting Solutions — Control Desk</div>

<div class="container">
    <div class="card" id="loginBox" style="max-width: 420px; margin: 60px auto; padding: 40px 35px;">
        <h2 style="font-size: 26px; justify-content: center; margin-bottom: 10px;">Admin Access</h2>
        <p style="text-align: center; color: var(--text-dark); font-size: 14px; margin-bottom: 30px; font-weight: 500;">Secure Management Terminal</p>
        <form id="loginForm" onsubmit="event.preventDefault(); window.loginAdmin();">
            <input type="email" id="email" placeholder="Corporate Email Address" required>
            <input type="password" id="password" placeholder="Secure Password" required>
            <button type="submit" class="login-btn">Sign In To Dashboard</button>
        </form>
    </div>

    <div id="adminPanel">
        <div class="card" style="padding: 20px 30px; overflow: hidden; margin-bottom: 30px; border-left: 5px solid var(--gold-dark);">
            <button class="logout-btn" onclick="window.logoutAdmin()">Exit Session</button>
            <span style="font-weight: 600; color: var(--text-dark); line-height: 45px; font-size: 18px;">👤 Terminal Secure: Administrator</span>
        </div>

        <div class="analytics-grid">
            <div class="stat-card visitors">
                <div class="stat-title">📊 Live Site Visitors</div>
                <div class="stat-number" id="totalVisitors">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">📝 Total Feed Analytics</div>
                <div class="stat-number" id="totalPostsCount">0</div>
            </div>
        </div>

        <div class="card">
            <h2>✍️ Compose Executive Broadcast</h2>
            <div class="row">
                <div>
                    <label>Distribution Type</label>
                    <select id="postType">
                        <option value="news">Regular Tax Update</option>
                        <option value="announcement">🚨 Critical Announcement</option>
                    </select>
                </div>
                <div>
                    <label>Stream Category</label>
                    <select id="postCategory">
                        <option value="General">General</option>
                        <option value="GST">GST Updates</option>
                        <option value="Income Tax">Income Tax</option>
                        <option value="Audit">Audit & Assurance</option>
                        <option value="Accounting">Accounting Solutions</option>
                    </select>
                </div>
            </div>

            <label>Broadcast Title</label>
            <input type="text" id="postTitle" placeholder="Enter headline statement...">
            
            <label>Featured Infographic Media (Optional)</label>
            <label for="imageFile" class="custom-file-btn" id="uploadBtnLabel">📁 Click to Upload Graphic Attachment</label>
            <input type="file" id="imageFile" accept="image/*">
            <img id="previewImage" style="display:none; width:100%; max-height:250px; object-fit:contain; border-radius:12px; margin-bottom:20px; background:#f8fafc; border:1px solid #e2e8f0;">
            
            <label>Content Description / Brief</label>
            <textarea id="postContent" placeholder="Write comprehensive update specifications here..."></textarea>

            <button class="publish-btn" onclick="window.saveContent('published')" id="submitBtn">Deploy Live Broadcast</button>
            <button class="draft-btn" onclick="window.saveContent('draft')">Store to Drafts</button>
        </div>

        <div class="card">
            <h2>🗄️ Stream Management Registry</h2>
            <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <label style="margin-top:0; color:var(--text-dark);">Filter Stream Logs:</label>
                <select id="filterCategory" onchange="window.loadPosts()" style="width:auto; margin:0; padding:10px 20px; border-radius:10px;">
                    <option value="All">All Categories</option>
                    <option value="General">General</option>
                    <option value="GST">GST Updates</option>
                    <option value="Income Tax">Income Tax</option>
                    <option value="Audit">Audit & Assurance</option>
                    <option value="Accounting">Accounting Solutions</option>
                </select>
            </div>
            <div id="postsContainer"></div>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL =
