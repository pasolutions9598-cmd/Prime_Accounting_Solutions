<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Accounting Solutions | Admin Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{ --navy:#071630; --navy2:#002d72; --gold:#dfb74c; --gold2:#d4af37; --bg:#f5f7fb; --card:#ffffff; --text:#334155; --border:#e2e8f0; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        
        /* Layout */
        .admin-layout { display: flex; min-height: 100vh; }
        #sidebar { width: 280px; background: linear-gradient(180deg, var(--navy), var(--navy2)); color: #fff; padding: 25px; }
        #main-area { flex: 1; display: flex; flex-direction: column; }
        .page-content { padding: 30px; display: none; }
        .page-content.active { display: block; }

        /* Branding */
        .brand { text-align: center; margin-bottom: 30px; }
        .brand img { width: 100px; }
        .brand h2 { color: var(--gold); font-family: 'Outfit'; margin-top: 10px; }
        
        /* Navigation */
        .nav-item { display: block; padding: 15px; color: #cbd5e1; text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: var(--gold); }

        /* Dashboard Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--gold); }
        .card h3 { font-size: 28px; color: var(--navy); }

        /* Forms & Buttons */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-gold { background: var(--gold); color: var(--navy); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="login-section" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy);">
    <div style="background:white; padding:40px; border-radius:20px; width:400px; text-align:center;">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;">
        <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="handleLogin()" class="btn btn-gold" style="width:100%;">Login</button>
    </div>
</div>

<div id="admin-panel" class="admin-layout" style="display:none;">
    <aside id="sidebar">
        <div class="brand">
            <img src="Logo.png" alt="Logo">
            <h2>Prime Admin</h2>
        </div>
        <a class="nav-item active" onclick="showPage('dashboard')">Dashboard</a>
        <a class="nav-item" onclick="showPage('leads')">Contact Leads</a>
        <a class="nav-item" onclick="showPage('posts')">Posts Management</a>
        <a class="nav-item" onclick="logout()">Logout</a>
    </aside>

    <main id="main-area">
        <header style="padding: 20px 30px; background: white; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="page-title">Dashboard</h2>
            <div id="status">System Online</div>
        </header>

        <section id="dashboard" class="page-content active">
            <div class="grid">
                <div class="card"><h3>0</h3><p>Total Visitors</p></div>
                <div class="card"><h3>0</h3><p>Total Leads</p></div>
            </div>
            <canvas id="analyticsChart"></canvas>
        </section>

        <section id="leads" class="page-content">
            <table>
                <thead><tr><th>Name</th><th>Phone</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="leads-body"></tbody>
            </table>
        </section>

        <section id="posts" class="page-content">
            </section>
    </main>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    
    // Initialize (REPLACE WITH YOUR KEYS)
    const supabase = createClient('YOUR_URL', 'YOUR_KEY');

    // Navigation Logic
    window.showPage = (pageId) => {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelector(`[onclick="showPage('${pageId}')"]`).classList.add('active');
        document.getElementById('page-title').innerText = pageId.toUpperCase();
    }

    // Login Logic
    window.handleLogin = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(email === "p.a.solutions9598@gmail.com" && pass === "aqibsolutions@9598") {
            localStorage.setItem('auth', 'true');
            window.location.reload();
        } else alert("Invalid Credentials");
    }

    window.logout = () => {
        localStorage.removeItem('auth');
        window.location.reload();
    }

    // Auth Check
    if(localStorage.getItem('auth') === 'true') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'flex';
        initDashboard();
    }

    async function initDashboard() {
        // Fetch Leads
        const { data: leads } = await supabase.from('leads').select('*');
        const tbody = document.getElementById('leads-body');
        leads.forEach(lead => {
            tbody.innerHTML += `<tr>
                <td>${lead.name}</td>
                <td>${lead.phone}</td>
                <td>${lead.status}</td>
                <td>
                    <a href="https://wa.me/91${lead.phone}" class="btn btn-gold">WhatsApp</a>
                </td>
            </tr>`;
        });
    }
</script>
</body>
</html>
